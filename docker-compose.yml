services:
  postgres:
    image: postgres:16
    container_name: game-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: main_db
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - game-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d main_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: game-keycloak
    entrypoint:
      - /bin/sh
      - -ec
      - |
        sed \
          -e "s|__KC_SMTP_HOST__|$${KC_SMTP_HOST}|g" \
          -e "s|__KC_SMTP_PORT__|$${KC_SMTP_PORT}|g" \
          -e "s|__KC_SMTP_FROM__|$${KC_SMTP_FROM}|g" \
          -e "s|__KC_SMTP_FROM_DISPLAY_NAME__|$${KC_SMTP_FROM_DISPLAY_NAME}|g" \
          -e "s|__KC_SMTP_USER__|$${KC_SMTP_USER}|g" \
          -e "s|__KC_SMTP_PASSWORD__|$${KC_SMTP_PASSWORD}|g" \
          -e "s|__KC_SMTP_AUTH__|$${KC_SMTP_AUTH}|g" \
          -e "s|__KC_SMTP_SSL__|$${KC_SMTP_SSL}|g" \
          -e "s|__KC_SMTP_STARTTLS__|$${KC_SMTP_STARTTLS}|g" \
          -e "s|__FRONTEND_URL__|$${FRONTEND_URL}|g" \
          /opt/keycloak/data/import/templates/game-realm.template.json \
          > /opt/keycloak/data/import/game-realm.json
        exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_PROXY: edge
      KC_HTTP_RELATIVE_PATH: "/"
      KC_SMTP_HOST: ${KC_SMTP_HOST}
      KC_SMTP_PORT: ${KC_SMTP_PORT}
      KC_SMTP_FROM: ${KC_SMTP_FROM}
      KC_SMTP_FROM_DISPLAY_NAME: ${KC_SMTP_FROM_DISPLAY_NAME}
      KC_SMTP_USER: ${KC_SMTP_USER}
      KC_SMTP_PASSWORD: ${KC_SMTP_PASSWORD}
      KC_SMTP_AUTH: ${KC_SMTP_AUTH}
      KC_SMTP_SSL: ${KC_SMTP_SSL}
      KC_SMTP_STARTTLS: ${KC_SMTP_STARTTLS}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./keycloak-import:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - game-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/game-content || true;
      /usr/bin/mc anonymous set public myminio/game-content;
      /usr/bin/mc mb myminio/user-data || true;
      /usr/bin/mc anonymous set private myminio/user-data;
      exit 0;
      "
    networks:
      - game-network

  main-service:
    image: ${MAIN_SERVICE_IMAGE}
    container_name: game-main-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      JAVA_OPTS: ${MAIN_SERVICE_JAVA_OPTS:--Xms256m -Xmx512m}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      APP_MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_URL}
      APP_PUBLICATIONS_DEFAULT_PAGE_SIZE: ${APP_PUBLICATIONS_DEFAULT_PAGE_SIZE:-10}
      APP_PUBLICATIONS_MAX_PAGE_SIZE: ${APP_PUBLICATIONS_MAX_PAGE_SIZE:-50}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  api-gateway:
    image: ${API_GATEWAY_IMAGE}
    container_name: game-gateway
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${GATEWAY_PROFILE:-docker}
      SERVER_PORT: 8081
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${JWT_ISSUER_URI}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL}
      JAVA_OPTS: ${API_GATEWAY_JAVA_OPTS:--Xms256m -Xmx512m}
    depends_on:
      keycloak:
        condition: service_healthy
      main-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 20

  game-frontend:
    image: ${FRONTEND_IMAGE}
    container_name: game-frontend
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - game-network
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

networks:
  game-network:
    driver: bridge

volumes:
  pg-data:
  minio_data:
