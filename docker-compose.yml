services:
  postgres:
    image: postgres:16
    container_name: game-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: main_db
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - game-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d main_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: game-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: "/"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-import:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - game-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 3s
      retries: 20

  main-service:
    build:
      context: ../game-platform-main-service
      dockerfile: Dockerfile
    container_name: game-main-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms256m -Xmx512m"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      APP_MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_URL}
      APP_PUBLICATIONS_DEFAULT_PAGE_SIZE: 10
    restart: unless-stopped
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: ../game-platform-api-gateway
      dockerfile: Dockerfile
    container_name: game-gateway
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${GATEWAY_PROFILE:-docker}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/game-realm
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      keycloak:
        condition: service_healthy
      main-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - game-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8081 && echo -e 'GET /actuator/health HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && grep -q '200' <&3"]
      interval: 10s
      timeout: 3s
      retries: 20

  game-frontend:
    build:
      context: ../game-platform-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
        NEXT_PUBLIC_KEYCLOAK_REALM: game-realm
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: game-frontend
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8081
    container_name: game-frontend
    ports:
      - "3000:3000"
    networks:
      - game-network
    depends_on:
      - api-gateway

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - game-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/game-content || true;
      /usr/bin/mc anonymous set public myminio/game-content;
      /usr/bin/mc mb myminio/user-data || true;
      /usr/bin/mc anonymous set private myminio/user-data;
      exit 0;
      "
    networks:
      - game-network

networks:
  game-network:
    driver: bridge

volumes:
  pg-data:
  minio_data: