global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8081"]

  - job_name: main-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["main-service:8082"]

  - job_name: player-profile-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["player-profile-service:8083"]

  - job_name: trust-score-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["trust-score-service:8084"]

  - job_name: joint-purchase-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["joint-purchase-service:8085"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8086"]
